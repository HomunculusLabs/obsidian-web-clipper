<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="page-type" id="pageType">
        <span class="page-icon" id="pageIcon">🌐</span>
        <span class="page-label" id="pageLabel">Web Page</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="themeBtn" title="Toggle dark mode" aria-pressed="false">🌙</button>
        <button class="header-btn" id="historyBtn" title="History">🕘</button>
        <button class="header-btn" id="settingsBtn" title="Settings">⚙️</button>
      </div>
    </header>

    <!-- Template indicator -->
    <div class="template-indicator" id="templateIndicator" style="display: none;">
      <span class="template-badge" id="templateBadge">📋 Template: <span id="templateName"></span></span>
      <div class="template-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="templateToggle" checked>
          <span class="toggle-switch template-switch"></span>
          <span class="toggle-text">Use Template</span>
        </label>
      </div>
    </div>

    <!-- Selection indicator -->
    <div class="selection-indicator" id="selectionIndicator" style="display: none;">
      <span class="selection-badge">📝 Selection detected</span>
      <div class="selection-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="selectionToggle" checked>
          <span class="toggle-switch"></span>
          <span class="toggle-text">Clip Selection</span>
        </label>
      </div>
      <div class="selection-preview" id="selectionPreview"></div>
    </div>

    <nav class="tabs" aria-label="Popup tabs">
      <button class="tab-btn active" data-tab="clip" type="button">Clip</button>
      <button class="tab-btn" data-tab="preview" type="button" aria-keyshortcuts="Control+P Meta+P">Preview</button>
      <button class="tab-btn" data-tab="history" type="button">History</button>
    </nav>

    <div class="tab-content active" id="tabClip">
      <div class="content">
        <div class="field">
          <label for="titleInput">Title</label>
          <input type="text" id="titleInput" placeholder="Page title will appear here">
          <div class="title-suggestions" id="titleSuggestions" style="display: none;">
            <span class="title-suggestions-label">Suggestions:</span>
            <div class="title-options" id="titleOptions"></div>
          </div>
        </div>

        <div class="field">
          <label for="vaultSelect">Vault</label>
          <select id="vaultSelect"></select>
        </div>

        <div class="field">
          <label for="folderInput">Save Folder</label>
          <select id="folderInput">
            <option value="2 - Source Material/Clips">2 - Source Material/Clips</option>
          </select>
          <div class="folder-actions">
            <button type="button" id="refreshFoldersBtn" class="folder-action-btn">Refresh Vault Folders</button>
            <button type="button" id="createFolderBtn" class="folder-action-btn folder-action-btn-primary">Create Folder</button>
          </div>
          <div class="folder-create" id="folderCreateRow" style="display: none;">
            <input type="text" id="newFolderInput" placeholder="Folder path (e.g. Research/Articles)">
            <div class="folder-create-actions">
              <button type="button" id="confirmCreateFolderBtn" class="folder-action-btn folder-action-btn-primary">Create</button>
              <button type="button" id="cancelCreateFolderBtn" class="folder-action-btn">Cancel</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="tagsInput">Tags</label>
          <input type="text" id="tagsInput" placeholder="web-clip">
          <div class="tag-suggestions" id="tagSuggestions" style="display: none;">
            <span class="tag-suggestions-label">Suggested:</span>
            <div class="tag-chips" id="tagChips"></div>
          </div>
        </div>

        <div class="formatting-options" id="formattingOptions">
          <div class="formatting-header">
            <span class="formatting-title">Formatting</span>
            <div class="formatting-presets" role="group" aria-label="Formatting presets">
              <button type="button" class="format-preset-btn" id="presetBalancedBtn">Balanced</button>
              <button type="button" class="format-preset-btn" id="presetTextOnlyBtn">Text-only</button>
              <button type="button" class="format-preset-btn" id="presetFullFidelityBtn">Full</button>
            </div>
          </div>
          <div class="formatting-grid">
            <label class="toggle-label">
              <input type="checkbox" id="formatIncludeImages" checked>
              <span class="toggle-switch"></span>
              <span class="toggle-text">Include images</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="formatIncludeLinks" checked>
              <span class="toggle-switch"></span>
              <span class="toggle-text">Include links</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="formatIncludeMetadata" checked>
              <span class="toggle-switch"></span>
              <span class="toggle-text">Include metadata</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="formatCleanFormatting" checked>
              <span class="toggle-switch"></span>
              <span class="toggle-text">Clean formatting</span>
            </label>
          </div>
        </div>

        <button class="clip-btn" id="clipBtn" aria-keyshortcuts="Enter">
          <span class="btn-text">Clip to Obsidian</span>
        </button>

        <button class="batch-clip-btn" id="clipAllTabsBtn" type="button">
          Clip All Tabs
        </button>

        <button class="batch-clip-btn batch-clip-btn-secondary" id="clipTabGroupBtn" type="button" style="display: none;">
          Clip Current Tab Group
        </button>

        <div class="status" id="status"></div>
      </div>
    </div>

    <div class="tab-content" id="tabPreview">
      <div class="preview-container">
        <div class="preview-loading" id="previewLoading">
          <span class="preview-loading-text">Open Preview to generate a cleaned markdown preview</span>
          <span class="preview-loading-hint">Content is extracted without saving to Obsidian.</span>
        </div>
        <div class="preview-content" id="previewContent"></div>
      </div>

      <button class="clip-btn clip-btn-secondary" id="clipFromPreviewBtn" aria-keyshortcuts="Enter">
        <span class="btn-text">Clip to Obsidian</span>
      </button>
    </div>

    <div class="tab-content" id="tabHistory">
      <div class="history-container">
        <div class="history-filters">
          <input type="search" id="historySearch" class="history-search" placeholder="Search title, URL, or tags">
          <div class="history-date-range">
            <input type="date" id="historyDateFrom" class="history-date-input" aria-label="Filter history from date">
            <span class="history-date-separator">→</span>
            <input type="date" id="historyDateTo" class="history-date-input" aria-label="Filter history to date">
            <button type="button" id="historyClearFilters" class="history-clear-btn">Clear</button>
          </div>
        </div>
        <div class="history-empty" id="historyEmpty">No clips yet. Your last 50 clips will appear here.</div>
        <div class="history-empty" id="historyNoResults" style="display: none;">No clips match the current filters.</div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
