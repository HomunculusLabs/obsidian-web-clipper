<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="page-type" id="pageType">
        <span class="page-icon" id="pageIcon">🌐</span>
        <span class="page-label" id="pageLabel">Web Page</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
    </header>

    <!-- Template indicator -->
    <div class="template-indicator" id="templateIndicator" style="display: none;">
      <span class="template-badge" id="templateBadge">📋 Template: <span id="templateName"></span></span>
      <div class="template-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="templateToggle" checked>
          <span class="toggle-switch template-switch"></span>
          <span class="toggle-text">Use Template</span>
        </label>
      </div>
    </div>

    <!-- Selection indicator -->
    <div class="selection-indicator" id="selectionIndicator" style="display: none;">
      <span class="selection-badge">📝 Selection detected</span>
      <div class="selection-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="selectionToggle" checked>
          <span class="toggle-switch"></span>
          <span class="toggle-text">Clip Selection</span>
        </label>
      </div>
      <div class="selection-preview" id="selectionPreview"></div>
    </div>

    <div class="content">
      <div class="field">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" placeholder="Page title will appear here">
        <div class="title-suggestions" id="titleSuggestions" style="display: none;">
          <span class="title-suggestions-label">Suggestions:</span>
          <div class="title-options" id="titleOptions"></div>
        </div>
      </div>

      <div class="field">
        <label for="folderInput">Save Folder</label>
        <select id="folderInput">
          <option value="2 - Source Material/Clips">2 - Source Material/Clips</option>
        </select>
      </div>

      <div class="field">
        <label for="tagsInput">Tags</label>
        <input type="text" id="tagsInput" placeholder="web-clip">
        <div class="tag-suggestions" id="tagSuggestions" style="display: none;">
          <span class="tag-suggestions-label">Suggested:</span>
          <div class="tag-chips" id="tagChips"></div>
        </div>
      </div>

      <button class="clip-btn" id="clipBtn">
        <span class="btn-text">Clip to Obsidian</span>
      </button>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
